# Paper-aligned config — stages 0–3, 7 core losses
model:
  hidden_size: 2880
  vocab_size: 201088
  notes_dim: 2048
  num_heads: 32
  plan_vocab_size: 65536
  plan_hash_salt: "parallel-decoder-v1"
  trunk:
    base_model: "gpt-oss-20b/original"
    torch_dtype: "bfloat16"
    device_map: null
    attn_implementation: "flash_attention_2"
    gradient_checkpointing: true
    unfreeze_top_n_layers: 0
    unfreeze_modules:
      - "lm_head"
      - "adapter"
  instrumentation:
    enabled: true
    top_k_layers: 8
    gate_init: -4.0
  stream_adapters:
    hidden_size: 2880
    bottleneck_size: 512
    streams:
      - "stream_0"
      - "stream_1"
      - "stream_2"
    activation: "gelu"
    dropout: 0.05
  notes_bus:
    snapshot_dim: 2048
    max_snapshots: 4
    lag: 1
    dtype: "bfloat16"
  cross_attention:
    hidden_size: 2880
    notes_dim: 2048
    num_heads: 32
    gating_init: -4.0
  planner_head:
    hidden_size: 2880
    vocab_size: 65536
    num_slots: 16
    dropout: 0.0
  notes_head:
    hidden_size: 2880
    notes_dim: 2048
    dropout: 0.0
    gated: true
  speculation_head:
    hidden_size: 2880
    notes_dim: 2048
    dropout: 0.0
    teacher_scale: 1.0
  agreement_head:
    hidden_size: 2880
    dropout: 0.1
training:
  dataset_path: "data/processed/pdt_10k_gpt41/kd_train.jsonl"
  eval_dataset_path: "data/processed/pdt_10k_gpt41/kd_validation.jsonl"
  telemetry_dir: "experiments/gpt_oss"
  resume_from_checkpoint: true
  batch_size: 1
  grad_accumulation: 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_steps: 50000
  warmup_steps: 1250
  save_every: 2500
  log_interval: 25
  eval_interval: 10000
  device: null
  topology: all_to_all
  teacher:
    enabled: true
    type: "stop_grad"
    ema_decay: 0.995
  dataset_teacher:
    cache_dir: "data/teacher_cache"
    max_snapshots: 4
    id_field: "example_id"
    refresh_cache: false
  curriculum:
    B: 4
    L: 32
    delta: 1
    rho_by_stream: {}
    steps_per_stage: 0
    stage_schedule:
      - 0      # Stage 0: Planner Pretrain (0–3749)
      - 3750   # Stage 1: Stream Bootstrap (3750–9999)
      - 10000  # Stage 2: Notes Bus Enable / SNC Training (10000–24999)
      - 25000  # Stage 3: Commit Control / Coverage+Agreement (25000–50000)
  stage_policies:
    0:
      name: "planner_pretrain"
      freeze:
        - "trunk"
        - "stream_adapters"
        - "cross_attention"
        - "speculation_head"
        - "agreement_head"
        - "coverage_head"
        - "stream_classifier"
      unfreeze:
        - "planner_head"
        - "notes_head"
        - "plan_notes_proj"
    1:
      name: "stream_bootstrap"
      freeze:
        - "trunk"
        - "speculation_head"
        - "agreement_head"
        - "coverage_head"
      unfreeze:
        - "stream_adapters"
        - "cross_attention"
        - "stream_classifier"
    2:
      name: "notes_bus_enable"
      freeze:
        - "trunk"
        - "agreement_head"
        - "coverage_head"
      unfreeze:
        - "speculation_head"
    3:
      name: "commit_control"
      bus_mix_prob: 0.35
      stream_dropout_prob: 0.15
      freeze:
        - "trunk"
      unfreeze:
        - "agreement_head"
        - "coverage_head"
  loss_weights:
    kd: 2.0
    cov: 1.0
    agree: 1.0
  coverage_threshold: 0.4
  bus_mix_prob: 0.0
  stream_dropout_prob: 0.0
  parallel_micro_steps: 0
  notes_noise:
    drop_p: 0.0
    paraphrase_p: 0.0
  metrics:
    mask_ablation_every: 100
    stability_every: 501
  kd_temperature_planner: 1.0
  kd_temperature_lm: 0.5
