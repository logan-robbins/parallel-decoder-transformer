<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 700" font-family="'Times New Roman', Times, serif" font-size="13">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="ar-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc3545"/>
    </marker>
    <marker id="ar-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#28a745"/>
    </marker>
    <marker id="ar-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffc107"/>
    </marker>
  </defs>

  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="bold">Figure 4: Synchronized Block Emission Protocol</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#666">Decode → Summarize → Agree → Commit → Continue</text>

  <!-- Time axis -->
  <line x1="50" y1="80" x2="50" y2="660" stroke="#ccc" stroke-width="1"/>
  <text x="40" y="76" text-anchor="middle" font-size="10" fill="#999" transform="rotate(-90, 30, 370)">time →</text>

  <!-- ============================================ -->
  <!-- PHASE 0: Prompt Encoding + Planning          -->
  <!-- ============================================ -->

  <rect x="70" y="70" width="660" height="60" rx="5" fill="#dce6f0" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a4a6b">Phase 0: Prompt Encoding + Planning</text>
  <text x="400" y="108" text-anchor="middle" font-size="10" fill="#2a4a6b">Frozen trunk encodes prompt → Planner head predicts z₁:S → Snapshot 0 published to bus</text>
  <text x="400" y="122" text-anchor="middle" font-size="9" fill="#4a7ab5">(single pass, before any stream starts)</text>

  <!-- ============================================ -->
  <!-- Streams Column Headers                       -->
  <!-- ============================================ -->

  <rect x="90" y="145" width="140" height="28" rx="3" fill="#e2d5f1" stroke="#7b2d8e" stroke-width="1.5"/>
  <text x="160" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b2d8e">Stream 0 (causes)</text>

  <rect x="270" y="145" width="140" height="28" rx="3" fill="#d5e2f1" stroke="#2d5e8e" stroke-width="1.5"/>
  <text x="340" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d5e8e">Stream 1 (battles)</text>

  <rect x="450" y="145" width="140" height="28" rx="3" fill="#d5f1e2" stroke="#2d8e5e" stroke-width="1.5"/>
  <text x="520" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d8e5e">Stream 2 (outcome)</text>

  <!-- Notes Bus column -->
  <rect x="620" y="145" width="110" height="28" rx="3" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="675" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">Notes Bus</text>

  <!-- Snapshot 0 in bus -->
  <rect x="625" y="185" width="100" height="22" rx="2" fill="#ffeeba" stroke="#d4a017" stroke-width="1"/>
  <text x="675" y="200" text-anchor="middle" font-size="9" fill="#856404">n⁰_plan</text>

  <!-- ============================================ -->
  <!-- ROUND v=1                                     -->
  <!-- ============================================ -->

  <text x="60" y="226" font-size="10" fill="#999" font-weight="bold">v=1</text>

  <!-- Decode blocks (τ tokens each) -->
  <rect x="100" y="210" width="120" height="50" rx="3" fill="#f0e0f5" stroke="#7b2d8e" stroke-width="1"/>
  <text x="160" y="230" text-anchor="middle" font-size="9" fill="#7b2d8e">Emit τ tokens</text>
  <text x="160" y="244" text-anchor="middle" font-size="8" fill="#7b2d8e">ŷ₁^(0) conditioned on</text>
  <text x="160" y="255" text-anchor="middle" font-size="8" fill="#7b2d8e">local KV + SNC(W₁⁰)</text>

  <rect x="280" y="210" width="120" height="50" rx="3" fill="#e0e8f5" stroke="#2d5e8e" stroke-width="1"/>
  <text x="340" y="230" text-anchor="middle" font-size="9" fill="#2d5e8e">Emit τ tokens</text>
  <text x="340" y="244" text-anchor="middle" font-size="8" fill="#2d5e8e">ŷ₁^(1) conditioned on</text>
  <text x="340" y="255" text-anchor="middle" font-size="8" fill="#2d5e8e">local KV + SNC(W₁¹)</text>

  <rect x="460" y="210" width="120" height="50" rx="3" fill="#e0f5e8" stroke="#2d8e5e" stroke-width="1"/>
  <text x="520" y="230" text-anchor="middle" font-size="9" fill="#2d8e5e">Emit τ tokens</text>
  <text x="520" y="244" text-anchor="middle" font-size="8" fill="#2d8e5e">ŷ₁^(2) conditioned on</text>
  <text x="520" y="255" text-anchor="middle" font-size="8" fill="#2d8e5e">local KV + SNC(W₁²)</text>

  <!-- Read arrows from bus to streams -->
  <line x1="625" y1="196" x2="222" y2="230" stroke="#ffc107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="625" y1="196" x2="402" y2="230" stroke="#ffc107" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="625" y1="196" x2="582" y2="230" stroke="#ffc107" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Emit notes -->
  <line x1="160" y1="260" x2="160" y2="278" stroke="#333" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="340" y1="260" x2="340" y2="278" stroke="#333" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="520" y1="260" x2="520" y2="278" stroke="#333" stroke-width="1" marker-end="url(#ar)"/>

  <!-- Provisional notes -->
  <rect x="108" y="280" width="104" height="22" rx="2" fill="#e2d5f1" stroke="#7b2d8e" stroke-width="1"/>
  <text x="160" y="295" text-anchor="middle" font-size="8" fill="#7b2d8e">n̂₁^(0) provisional</text>

  <rect x="288" y="280" width="104" height="22" rx="2" fill="#d5e2f1" stroke="#2d5e8e" stroke-width="1"/>
  <text x="340" y="295" text-anchor="middle" font-size="8" fill="#2d5e8e">n̂₁^(1) provisional</text>

  <rect x="468" y="280" width="104" height="22" rx="2" fill="#d5f1e2" stroke="#2d8e5e" stroke-width="1"/>
  <text x="520" y="295" text-anchor="middle" font-size="8" fill="#2d8e5e">n̂₁^(2) provisional</text>

  <!-- ============================================ -->
  <!-- AGREEMENT CHECK v=1                          -->
  <!-- ============================================ -->

  <rect x="90" y="316" width="500" height="40" rx="4" fill="#fff" stroke="#dc3545" stroke-width="2"/>
  <text x="340" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc3545">Coverage + Agreement Check</text>
  <text x="340" y="348" text-anchor="middle" font-size="9" fill="#dc3545">c_v^(k) = CoverageHead(H, E_plan)     r_v^(k) = AgreeHead(H, W, c, n̂)     A₁ = min(r₁^(k)) > γ ?</text>

  <!-- Commit result -->
  <rect x="90" y="366" width="242" height="24" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="211" y="382" text-anchor="middle" font-size="10" fill="#155724" font-weight="bold">A₁ = 1 → COMMIT blocks, publish notes</text>

  <rect x="348" y="366" width="242" height="24" rx="3" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="469" y="382" text-anchor="middle" font-size="10" fill="#721c24" font-weight="bold">A₁ = 0 → ROLLBACK failing streams</text>

  <!-- Notes written to bus -->
  <line x1="160" y1="302" x2="625" y2="224" stroke="#7b2d8e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>
  <line x1="340" y1="302" x2="625" y2="232" stroke="#2d5e8e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>
  <line x1="520" y1="302" x2="625" y2="240" stroke="#2d8e5e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>

  <!-- Updated bus state -->
  <rect x="625" y="215" width="100" height="48" rx="2" fill="#ffeeba" stroke="#d4a017" stroke-width="1"/>
  <text x="675" y="230" text-anchor="middle" font-size="8" fill="#856404">n⁰_plan</text>
  <text x="675" y="242" text-anchor="middle" font-size="8" fill="#856404">n̂₁^(0), n̂₁^(1), n̂₁^(2)</text>
  <text x="675" y="256" text-anchor="middle" font-size="8" fill="#856404">(visible after Δ)</text>

  <!-- ============================================ -->
  <!-- ROUND v=2                                     -->
  <!-- ============================================ -->

  <text x="60" y="420" font-size="10" fill="#999" font-weight="bold">v=2</text>

  <!-- Decode blocks round 2 -->
  <rect x="100" y="404" width="120" height="50" rx="3" fill="#f0e0f5" stroke="#7b2d8e" stroke-width="1"/>
  <text x="160" y="424" text-anchor="middle" font-size="9" fill="#7b2d8e">Emit τ tokens</text>
  <text x="160" y="438" text-anchor="middle" font-size="8" fill="#7b2d8e">ŷ₂^(0) sees n⁰ +</text>
  <text x="160" y="449" text-anchor="middle" font-size="8" fill="#7b2d8e">sibling notes from v=1</text>

  <rect x="280" y="404" width="120" height="50" rx="3" fill="#e0e8f5" stroke="#2d5e8e" stroke-width="1"/>
  <text x="340" y="424" text-anchor="middle" font-size="9" fill="#2d5e8e">Emit τ tokens</text>
  <text x="340" y="438" text-anchor="middle" font-size="8" fill="#2d5e8e">ŷ₂^(1) sees n⁰ +</text>
  <text x="340" y="449" text-anchor="middle" font-size="8" fill="#2d5e8e">sibling notes from v=1</text>

  <rect x="460" y="404" width="120" height="50" rx="3" fill="#e0f5e8" stroke="#2d8e5e" stroke-width="1"/>
  <text x="520" y="424" text-anchor="middle" font-size="9" fill="#2d8e5e">Emit τ tokens</text>
  <text x="520" y="438" text-anchor="middle" font-size="8" fill="#2d8e5e">ŷ₂^(2) sees n⁰ +</text>
  <text x="520" y="449" text-anchor="middle" font-size="8" fill="#2d8e5e">sibling notes from v=1</text>

  <!-- Read arrows from bus (now richer) -->
  <line x1="625" y1="250" x2="222" y2="424" stroke="#ffc107" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="625" y1="250" x2="402" y2="424" stroke="#ffc107" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="625" y1="250" x2="582" y2="424" stroke="#ffc107" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Annotation: richer context -->
  <rect x="625" y="280" width="100" height="32" rx="2" fill="#e8f5e9" stroke="#28a745" stroke-width="1"/>
  <text x="675" y="294" text-anchor="middle" font-size="8" fill="#155724" font-weight="bold">Richer context:</text>
  <text x="675" y="306" text-anchor="middle" font-size="7" fill="#155724">streams know what</text>

  <!-- Dots for more rounds -->
  <text x="340" y="480" text-anchor="middle" font-size="16" fill="#999">⋮</text>

  <!-- ============================================ -->
  <!-- FINAL: Merge                                 -->
  <!-- ============================================ -->

  <rect x="90" y="500" width="500" height="30" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="340" y="520" text-anchor="middle" font-size="11" fill="#555">... rounds continue until all streams emit EOS ...</text>

  <line x1="340" y1="530" x2="340" y2="552" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="150" y="554" width="380" height="50" rx="5" fill="#dce6f0" stroke="#4a7ab5" stroke-width="2"/>
  <text x="340" y="574" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a4a6b">Merge Committed Outputs</text>
  <text x="340" y="592" text-anchor="middle" font-size="10" fill="#2a4a6b">stitch by planner ownership + section order + stream completion state</text>

  <line x1="340" y1="604" x2="340" y2="626" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="220" y="628" width="240" height="36" rx="5" fill="#333" stroke="#111" stroke-width="1.5"/>
  <text x="340" y="651" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Final Merged Answer</text>
</svg>