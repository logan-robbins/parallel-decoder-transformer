<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 680" font-family="'Times New Roman', Times, serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#28a745"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="290" y="28" text-anchor="middle" font-size="15" font-weight="bold">Figure 2: Instrumented Transformer Block</text>
  <text x="290" y="46" text-anchor="middle" font-size="11" fill="#666">One frozen decoder layer with sidecar modules (stream adapter + SNC)</text>

  <!-- ============================================ -->
  <!-- Main block container                         -->
  <!-- ============================================ -->
  <rect x="40" y="60" width="340" height="580" rx="6" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="78" font-size="10" fill="#888" font-style="italic">Frozen transformer block l</text>

  <!-- Input arrow -->
  <text x="190" y="652" text-anchor="middle" font-size="11" fill="#555">h_l  (from layer l−1)</text>
  <line x1="190" y1="640" x2="190" y2="618" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- Self-Attention Sub-block                     -->
  <!-- ============================================ -->

  <!-- LayerNorm -->
  <rect x="130" y="582" width="120" height="28" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="601" text-anchor="middle" font-size="10">LayerNorm</text>

  <line x1="190" y1="582" x2="190" y2="564" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Causal Self-Attention -->
  <rect x="110" y="520" width="160" height="42" rx="4" fill="#f0e6d0" stroke="#b8943e" stroke-width="1.5"/>
  <text x="190" y="538" text-anchor="middle" font-size="11" fill="#6b5a1e" font-weight="bold">Causal Self-Attention</text>
  <text x="190" y="554" text-anchor="middle" font-size="9" fill="#6b5a1e">Q, K, V from h_l (frozen weights)</text>

  <line x1="190" y1="520" x2="190" y2="502" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dropout -->
  <rect x="148" y="476" width="84" height="24" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="493" text-anchor="middle" font-size="10">Dropout</text>

  <line x1="190" y1="476" x2="190" y2="458" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- SNC INJECTION POINT (highlighted)            -->
  <!-- ============================================ -->

  <rect x="68" y="396" width="244" height="60" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="2.5"/>
  <text x="190" y="416" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">SNC Cross-Attention (DeltaSNC)</text>
  <text x="190" y="433" text-anchor="middle" font-size="10" fill="#155724">Q = W_Q · attn_out    K = W_K · notes    V = W_V · notes</text>
  <text x="190" y="449" text-anchor="middle" font-size="10" fill="#155724">attn_out += σ(notes_gate) · O_proj(softmax(QK^T/√d) · V)</text>

  <!-- Notes Bus input arrow -->
  <rect x="410" y="390" width="150" height="72" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="485" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">Visible Notes</text>
  <text x="485" y="428" text-anchor="middle" font-size="11" fill="#856404">Window W_v^(k)</text>
  <text x="485" y="446" text-anchor="middle" font-size="9" fill="#856404">[B, num_notes, d_notes]</text>
  <text x="485" y="458" text-anchor="middle" font-size="9" fill="#856404">from Dynamic Notes Bus</text>

  <line x1="410" y1="426" x2="314" y2="426" stroke="#28a745" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <text x="362" y="418" text-anchor="middle" font-size="9" fill="#28a745" font-weight="bold">K, V</text>

  <!-- notes_gate annotation -->
  <rect x="410" y="476" width="150" height="40" rx="3" fill="#e8f5e9" stroke="#28a745" stroke-width="1"/>
  <text x="485" y="494" text-anchor="middle" font-size="9" fill="#155724" font-weight="bold">notes_gate (learned)</text>
  <text x="485" y="508" text-anchor="middle" font-size="9" fill="#155724">init = −4.0 → σ ≈ 0.018</text>

  <line x1="410" y1="496" x2="314" y2="448" stroke="#28a745" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="190" y1="396" x2="190" y2="376" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- FFN Sub-block                                -->
  <!-- ============================================ -->

  <!-- Residual add (self-attn + original) -->
  <!-- We show the parallel residual path -->
  <rect x="130" y="344" width="120" height="28" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="363" text-anchor="middle" font-size="10">Add (residual)</text>

  <!-- Residual skip line from input -->
  <line x1="60" y1="618" x2="60" y2="358" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="60" y1="358" x2="128" y2="358" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <line x1="190" y1="344" x2="190" y2="324" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LayerNorm 2 -->
  <rect x="130" y="296" width="120" height="28" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="315" text-anchor="middle" font-size="10">LayerNorm</text>

  <line x1="190" y1="296" x2="190" y2="278" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FFN -->
  <rect x="110" y="236" width="160" height="40" rx="4" fill="#f0e6d0" stroke="#b8943e" stroke-width="1.5"/>
  <text x="190" y="254" text-anchor="middle" font-size="11" fill="#6b5a1e" font-weight="bold">Feed-Forward Network</text>
  <text x="190" y="268" text-anchor="middle" font-size="9" fill="#6b5a1e">(frozen weights)</text>

  <line x1="190" y1="236" x2="190" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dropout -->
  <rect x="148" y="192" width="84" height="24" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="209" text-anchor="middle" font-size="10">Dropout</text>

  <line x1="190" y1="192" x2="190" y2="174" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- STREAM ADAPTER INJECTION (highlighted)       -->
  <!-- ============================================ -->

  <rect x="68" y="120" width="244" height="52" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="2.5"/>
  <text x="190" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">Stream Adapter</text>
  <text x="190" y="157" text-anchor="middle" font-size="10" fill="#155724">mlp_out += σ(adapter_gate) · StreamAdapters(stream_id, mlp_out)</text>

  <!-- Stream ID input -->
  <rect x="410" y="120" width="150" height="40" rx="3" fill="#e2d5f1" stroke="#7b2d8e" stroke-width="1.5"/>
  <text x="485" y="138" text-anchor="middle" font-size="10" fill="#7b2d8e" font-weight="bold">stream_id ∈ {0, 1, 2}</text>
  <text x="485" y="152" text-anchor="middle" font-size="9" fill="#7b2d8e">routes to per-stream weights</text>

  <line x1="410" y1="146" x2="314" y2="146" stroke="#7b2d8e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Final residual add -->
  <line x1="190" y1="120" x2="190" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="130" y="74" width="120" height="24" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="190" y="91" text-anchor="middle" font-size="10">Add (residual)</text>

  <!-- Output arrow -->
  <line x1="190" y1="74" x2="190" y2="64" stroke="#333" stroke-width="2"/>
  <text x="190" y="58" text-anchor="middle" font-size="11" fill="#555">h_{l+1}  (to layer l+1 or heads)</text>
</svg>