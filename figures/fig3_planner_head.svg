<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Times New Roman', Times, serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="a-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#28a745"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold">Figure 3: Prompt-Time Latent Planner</text>
  <text x="340" y="46" text-anchor="middle" font-size="11" fill="#666">Pool → Project → Embed → Snapshot 0</text>

  <!-- ============================================ -->
  <!-- Step 1: Prompt hidden states                 -->
  <!-- ============================================ -->

  <!-- H_x matrix visualization -->
  <rect x="30" y="80" width="280" height="80" rx="4" fill="#dce6f0" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="170" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a4a6b">H_x  =  Frozen Trunk(prompt)</text>
  <text x="170" y="118" text-anchor="middle" font-size="10" fill="#2a4a6b">[B, T, 4096]</text>

  <!-- Token boxes inside H_x -->
  <rect x="44" y="130" width="36" height="20" rx="2" fill="#b8cfe0" stroke="#4a7ab5" stroke-width="1"/>
  <text x="62" y="144" text-anchor="middle" font-size="8" fill="#2a4a6b">h₁</text>
  <rect x="84" y="130" width="36" height="20" rx="2" fill="#b8cfe0" stroke="#4a7ab5" stroke-width="1"/>
  <text x="102" y="144" text-anchor="middle" font-size="8" fill="#2a4a6b">h₂</text>
  <rect x="124" y="130" width="36" height="20" rx="2" fill="#b8cfe0" stroke="#4a7ab5" stroke-width="1"/>
  <text x="142" y="144" text-anchor="middle" font-size="8" fill="#2a4a6b">h₃</text>
  <text x="178" y="144" text-anchor="middle" font-size="10" fill="#4a7ab5">···</text>
  <rect x="196" y="130" width="36" height="20" rx="2" fill="#b8cfe0" stroke="#4a7ab5" stroke-width="1"/>
  <text x="214" y="144" text-anchor="middle" font-size="8" fill="#2a4a6b">h_T</text>
  <!-- mask indicators -->
  <text x="62" y="155" text-anchor="middle" font-size="7" fill="#28a745">✓</text>
  <text x="102" y="155" text-anchor="middle" font-size="7" fill="#28a745">✓</text>
  <text x="142" y="155" text-anchor="middle" font-size="7" fill="#28a745">✓</text>
  <text x="214" y="155" text-anchor="middle" font-size="7" fill="#999">pad</text>

  <!-- Label for "all token positions" -->
  <text x="170" y="72" text-anchor="middle" font-size="10" fill="#555" font-style="italic">"Tell me about the Franco-Prussian War"</text>

  <!-- Arrow down to pooling -->
  <line x1="170" y1="160" x2="170" y2="184" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============================================ -->
  <!-- Step 2: Masked Mean Pool                     -->
  <!-- ============================================ -->

  <rect x="90" y="186" width="160" height="44" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="170" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Masked Mean Pool</text>
  <text x="170" y="222" text-anchor="middle" font-size="9" fill="#155724">Σ(h_t · mask_t) / Σ(mask_t)</text>

  <!-- Annotation: collapses sequence -->
  <text x="310" y="200" font-size="10" fill="#555" font-style="italic">[B, T, 4096]</text>
  <text x="310" y="216" font-size="10" fill="#555" font-style="italic">→ [B, 4096]</text>
  <text x="310" y="232" font-size="9" fill="#888">sequence dimension eliminated</text>

  <!-- Arrow down -->
  <line x1="170" y1="230" x2="170" y2="254" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Single pooled vector -->
  <rect x="110" y="256" width="120" height="30" rx="12" fill="#e8f5e9" stroke="#28a745" stroke-width="1.5"/>
  <text x="170" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">p_x [B, 4096]</text>

  <!-- Arrow down to projection -->
  <line x1="170" y1="286" x2="170" y2="310" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============================================ -->
  <!-- Step 3: Linear Projection                    -->
  <!-- ============================================ -->

  <rect x="68" y="312" width="204" height="44" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="170" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Linear(4096, 16 × 65536)</text>
  <text x="170" y="348" text-anchor="middle" font-size="9" fill="#155724">one projection, all slots at once</text>

  <text x="310" y="328" font-size="10" fill="#555" font-style="italic">[B, 4096]</text>
  <text x="310" y="344" font-size="10" fill="#555" font-style="italic">→ [B, 1,048,576]</text>

  <!-- Arrow down -->
  <line x1="170" y1="356" x2="170" y2="378" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============================================ -->
  <!-- Step 4: Reshape + Argmax                     -->
  <!-- ============================================ -->

  <rect x="60" y="380" width="220" height="36" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1.5"/>
  <text x="170" y="396" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Reshape → [B, 16, 65536]</text>
  <text x="170" y="410" text-anchor="middle" font-size="9" fill="#155724">argmax per slot at inference</text>

  <!-- Arrow down -->
  <line x1="170" y1="416" x2="170" y2="438" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ============================================ -->
  <!-- Step 5: Slot IDs                             -->
  <!-- ============================================ -->

  <!-- Slot boxes -->
  <g transform="translate(36, 440)">
    <rect x="0" y="0" width="48" height="28" rx="3" fill="#28a745" stroke="#1e7e34" stroke-width="1.5"/>
    <text x="24" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">z₁</text>
    <text x="24" y="24" text-anchor="middle" font-size="7" fill="#d4edda">48821</text>

    <rect x="52" y="0" width="48" height="28" rx="3" fill="#28a745" stroke="#1e7e34" stroke-width="1.5"/>
    <text x="76" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">z₂</text>
    <text x="76" y="24" text-anchor="middle" font-size="7" fill="#d4edda">12990</text>

    <rect x="104" y="0" width="48" height="28" rx="3" fill="#28a745" stroke="#1e7e34" stroke-width="1.5"/>
    <text x="128" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">z₃</text>
    <text x="128" y="24" text-anchor="middle" font-size="7" fill="#d4edda">37744</text>

    <rect x="156" y="0" width="48" height="28" rx="3" fill="#28a745" stroke="#1e7e34" stroke-width="1.5"/>
    <text x="180" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">z₄</text>
    <text x="180" y="24" text-anchor="middle" font-size="7" fill="#d4edda">5501</text>

    <text x="220" y="18" font-size="12" fill="#28a745">···</text>

    <rect x="240" y="0" width="48" height="28" rx="3" fill="#ccc" stroke="#999" stroke-width="1"/>
    <text x="264" y="15" text-anchor="middle" font-size="8" fill="#666">z₁₅</text>
    <text x="264" y="24" text-anchor="middle" font-size="7" fill="#888">0 (pad)</text>
  </g>

  <!-- Label: active vs padded -->
  <text x="170" y="488" text-anchor="middle" font-size="9" fill="#555">← active plan items →                  ← padded →</text>

  <!-- ============================================ -->
  <!-- Right side: Embed + Project to Snapshot 0    -->
  <!-- ============================================ -->

  <!-- Arrow from slots to embedding -->
  <line x1="324" y1="454" x2="390" y2="454" stroke="#28a745" stroke-width="1.5" marker-end="url(#a-grn)"/>

  <!-- Plan Embedding -->
  <rect x="392" y="380" width="140" height="50" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="462" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">E_plan[z_i]</text>
  <text x="462" y="416" text-anchor="middle" font-size="9" fill="#155724">plan_embedding</text>
  <text x="462" y="428" text-anchor="middle" font-size="9" fill="#155724">[65536, 4096]</text>

  <!-- Arrow right to projection -->
  <line x1="462" y1="380" x2="462" y2="356" stroke="#28a745" stroke-width="1.5" marker-end="url(#a-grn)"/>

  <!-- Plan Notes Projection -->
  <rect x="392" y="310" width="140" height="44" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="2"/>
  <text x="462" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">W_plan · e_i</text>
  <text x="462" y="346" text-anchor="middle" font-size="9" fill="#155724">Linear(4096, 2048)</text>

  <!-- Arrow right to normalize -->
  <line x1="462" y1="310" x2="462" y2="286" stroke="#28a745" stroke-width="1.5" marker-end="url(#a-grn)"/>

  <!-- Normalize -->
  <rect x="402" y="256" width="120" height="28" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1.5"/>
  <text x="462" y="275" text-anchor="middle" font-size="10" fill="#155724">Mean + LayerNorm</text>

  <!-- Arrow to Snapshot 0 -->
  <line x1="462" y1="256" x2="462" y2="220" stroke="#28a745" stroke-width="2" marker-end="url(#a-grn)"/>

  <!-- ============================================ -->
  <!-- Snapshot 0: The Output                       -->
  <!-- ============================================ -->

  <rect x="370" y="140" width="184" height="78" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2.5"/>
  <text x="462" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">Snapshot 0</text>
  <text x="462" y="182" text-anchor="middle" font-size="10" fill="#856404">n⁰_plan  [1, d_notes]</text>
  <text x="462" y="200" text-anchor="middle" font-size="9" fill="#856404">published to Dynamic Notes Bus</text>
  <text x="462" y="214" text-anchor="middle" font-size="9" fill="#856404">before any stream emits tokens</text>

  <!-- Annotation: this is the coordination contract -->
  <rect x="370" y="80" width="184" height="48" rx="4" fill="none" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="462" y="98" text-anchor="middle" font-size="10" fill="#dc3545" font-weight="bold">Initial synchronization</text>
  <text x="462" y="114" text-anchor="middle" font-size="10" fill="#dc3545" font-weight="bold">contract for all streams</text>
  <line x1="462" y1="128" x2="462" y2="138" stroke="#dc3545" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>

  <!-- Training annotation -->
  <rect x="370" y="440" width="184" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="462" y="458" text-anchor="middle" font-size="10" fill="#555" font-weight="bold">Training target:</text>
  <text x="462" y="474" text-anchor="middle" font-size="9" fill="#555">L_plan = CE(logits, planner_ids)</text>
  <text x="462" y="490" text-anchor="middle" font-size="9" fill="#555">planner_ids = SHA-256 hashes of</text>
  <text x="462" y="502" text-anchor="middle" font-size="9" fill="#555">teacher plan contract items</text>
</svg>